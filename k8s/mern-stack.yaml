# k8s/mern-stack.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mern-app
spec:
  replicas: 2 # Ölçeklenebilirlik kriteri
  selector:
    matchLabels:
      app: mern
  template:
    metadata:
      labels:
        app: mern
    spec:
      containers:
      - name: backend
        image: tarsuslu/mern-server:latest
        ports:
        - containerPort: 5000
      - name: frontend
        image: tarsuslu/mern-client:latest
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: mern-service
spec:
  type: LoadBalancer # Dış dünyaya erişim
  ports:
  - port: 80
    targetPort: 80
  selector:
    app: mern